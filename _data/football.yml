# _data/football.yml
# One entry per visited FBS school.
# `logo` should point to a local logo asset, usually from:
#   /assets/img/talk-logos/fbs-library/
# `stadium_image` should point to a local stadium photo you add, for example:
#   /assets/img/football/ohio-stadium.jpg
#
# Example:
# - school: "Ohio State University"
#   logo: "/assets/img/talk-logos/fbs-library/Ohio_State_Buckeyes_logo-300x300.png"
#   stadium: "Ohio Stadium"
#   stadium_image: "/assets/img/football/ohio-stadium.jpg"
#   city: "Columbus"
#   state: "OH"
#   conference: "Big Ten"
#   lat: 40.0017
#   lng: -83.0197
#   championships: [1942, 1954, 1957, 1968, 2002, 2014]
#   favorite_players:
#     - "Eddie George"
#     - "Troy Smith"
#     - "Marvin Harrison Jr."
#   note: "The Horseshoe is even louder in person."
