t"> <header class="post-header"> <h1 class="post-title">publications</h1> <p class="post-description">Selected publications in <a href="https://jsom.utdallas.edu/the-utd-top-100-business-school-research-rankings/list-of-journals" target="_blank" class="header-link" style="color:#00a060;" rel="external nofollow noopener">UTD-24 journals</a>, using this <a href="https://nihuang.me/research/" target="_blank" class="header-link" style="color:#00a060;" rel="external nofollow noopener">template style</a>.</p> </header> <article> <link rel="stylesheet" href="/assets/css/research.css"> <div class="nh-research"> <div class="scholar-bar"> <a href="https://scholar.google.com/citations?user=VwQmUFQAAAAJ" target="_blank" class="scholar-btn" rel="external nofollow noopener"> <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewbox="0 0 24 24" fill="currentColor"> <path d="M12 24a7 7 0 1 1 0-14 7 7 0 0 1 0 14zm0-24L0 9.5h3.6v8.4h4.8V12h7.2v5.9h4.8V9.5H24z"></path> </svg> Google Scholar </a> </div> <div class="filter-bar"> <button class="filter-btn active" data-filter="all">All</button> <button class="filter-btn" data-filter="Future of Work">Future of Work</button> <button class="filter-btn" data-filter="Digital Platforms">Digital Platforms</button> <button class="filter-btn" data-filter="Digital Media">Digital Media</button> <button class="filter-btn" data-filter="Human-AI Interaction">Human-AI Interaction</button> <button class="view-toggle-btn" id="viewToggleBtn" data-current="list" title="Switch to timeline view"> <svg class="vtb-icon vtb-icon--timeline" width="13" height="13" viewbox="0 0 13 13" fill="none" aria-hidden="true"> <line x1="6.5" y1="1" x2="6.5" y2="12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"></line> <line x1="6.5" y1="3" x2="11.5" y2="3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"></line> <line x1="6.5" y1="6.5" x2="11.5" y2="6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"></line> <line x1="6.5" y1="10" x2="11.5" y2="10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"></line> <circle cx="6.5" cy="3" r="1.8" fill="currentColor"></circle> <circle cx="6.5" cy="6.5" r="1.8" fill="currentColor"></circle> <circle cx="6.5" cy="10" r="1.8" fill="currentColor"></circle> </svg> <svg class="vtb-icon vtb-icon--list" width="13" height="13" viewbox="0 0 13 13" fill="none" aria-hidden="true" style="display:none"> <line x1="4" y1="2.5" x2="12.5" y2="2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"></line> <line x1="4" y1="6.5" x2="12.5" y2="6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"></line> <line x1="4" y1="10.5" x2="12.5" y2="10.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"></line> <circle cx="1.8" cy="2.5" r="1.5" fill="currentColor"></circle> <circle cx="1.8" cy="6.5" r="1.5" fill="currentColor"></circle> <circle cx="1.8" cy="10.5" r="1.5" fill="currentColor"></circle> </svg> <span class="vtb-label" id="viewToggleLabel">Timeline</span> </button> </div> <div class="pub-list" id="pubList"></div> <div class="pub-timeline" id="timelineList" aria-hidden="true"></div> </div> <script>window.PUBLICATIONS=[{id:"",title:"When Do Equity Appeals Increase Giving? Evidence from Educational Crowdfunding",url:"",doi:"",authors:["Sabzehzar A","Burtch G","**Hong Y**","Raghu T"],journal:"ISR",year:2026,volume:"",forthcoming:!0,topics:["Digital Platforms"],abstract:""},{id:"",title:"Can Regulation Restore Authenticity? Evidence from Policies Against Online Review Suppression",url:"https://pubsonline.informs.org/doi/10.1287/isre.2023.0436",doi:"10.1287/isre.2023.0436",authors:["Sanatizadeh A","Burtch G","**Hong Y**","Hu Y"],journal:"ISR",year:2026,volume:"",forthcoming:!0,topics:["Digital Platforms","Digital Media"],abstract:"Anecdotal evidence suggests that businesses threaten consumers with legal action to suppress negative online reviews, creating a chilling effect that undermines transparency and trust online. Although policymakers increasingly recognize this issue and have taken steps to curb it, academic research exploring the effectiveness of regulatory interventions remains surprisingly scarce. This paper addresses that gap by providing a systematic evaluation of the Consumer Review Fairness Act (CRFA), a federal law enacted in the United States in December 2016 to curb review suppression. Leveraging detailed data from TripAdvisor, we demonstrate that the CRFA has had measurable impacts; following the law\u2019s enactment, hotel reviews in the United States have become systematically more negative, as indicated by both star ratings and textual sentiment. Furthermore, reviews have grown systematically longer. These results demonstrate that, following passage of the CFRA, reviews have become generally more informative but systematically more negative. Examining heterogeneity, we find that these declines in ratings have been most concentrated among less reputable hotels and hotels facing stronger competition, indicating that such businesses had been more heavily engaged in review suppression before the CFRA\u2019s passage. Furthermore, we see that these effects have accrued most heavily to reviews involving American consumers and long-tenured users, highlighting the role and influence of legal jurisdictional boundaries and platform experience. Finally, supplemental analyses speak to the prevalence of review censorship on TripAdvisor and the chilling effects of legal threats on consumers\u2019 subsequent reviews. We discuss the implications for policy, practice, and scholarship related to consumer protection and online transparency.\n"},{id:"",title:"Two Streams to Success: Unpacking the Informational and Relational Roles of Live Streaming in Online Shopping",url:"https://journals.sagepub.com/doi/10.1177/10591478251403725",doi:"10.1177/10591478251403725",authors:["Chen C","Hu Y","Lu Y","**Hong Y**"],journal:"POM",year:2026,volume:"",forthcoming:!0,topics:["Digital Media","Digital Platforms"],abstract:"The growing prominence of live streaming has attracted the attention from both e-commerce practitioners and the research community. This paper investigates the impact of online retailers adopting live streaming technology in business operations on their product sales, dissecting dual roles of live streaming: information provision and customer relationship management. Leveraging multiple archival data sources, we combine econometrics with deep learning to analyze the nuanced, dual roles of live streaming in online retail. Specifically, we develop a novel deep-learning framework to identify two types of live streaming strategies, product-oriented and nonproduct-oriented, and find that both strategies significantly increase online product sales. Notably, our research suggests that past review volume and product visual informativeness substitute the impact of using product-oriented live streaming; whereas seller's rating and product visual informativeness complement the impact of using nonproduct-oriented live streaming. These results suggest that product-oriented live streaming increases sales by reducing product uncertainty via information provision, whereas nonproduct-oriented live streaming increases sales via noninformation mechanisms, such as enhancing customer relationship management.\n"},{id:"",title:"Workflow Automation in Open-Source Software Development: Accelerating Innovation through Mechanization and Orchestration",url:"https://pubsonline.informs.org/doi/10.1287/isre.2024.1551",doi:"10.1287/isre.2024.1551",authors:["Huang A","Huang N","**Hong Y**"],journal:"ISR",year:2026,volume:"",forthcoming:!0,topics:["Human-AI Interaction","Digital Platforms"],abstract:"This study develops a conceptual framework distinguishing two foundational mechanisms of workflow automation, mechanization and orchestration, and empirically examines how workflow automation accelerates innovation in the context of open-source software (OSS) development. Drawing on the process automation, innovation, and OSS development literature, we propose that (a) workflow automation accelerates OSS innovation and (b) distinct workflow automation mechanisms\u2014mechanization and orchestration\u2014differentially affect incremental innovation (i.e., maintenance) and substantive innovation (i.e., new development), respectively. Based on longitudinal observations of more than 4,500 GitHub repositories and 280,000 issues from 2019 to 2020, we combine machine learning with econometrics in an embedded interlayering multimethod design. To test our hypotheses, our econometric analyses further employ look-ahead rolling entry matching (LA-REM) in tandem with different estimation strategies, including difference-in-differences (DiD) and instrumental variables (IVs). Our analyses first estimate that workflow automation (specifically GitHub Actions) accelerates issue resolution by 10.1%, translating to 4.3 days saved per issue, demonstrating significant improvement in innovation speed. Second, particularly notably, we distinguish between mechanization and orchestration to further investigate how these workflow automation mechanisms differentially affect two types of innovation in software development. Our analyses uncover that mechanization significantly accelerates the incremental innovation of maintenance by 7.8%, saving an average of 3.0 days per issue; however, orchestration shows an inconsequential effect. In contrast, for the substantive innovation of new development, mechanization shows a limited effect, whereas orchestration accelerates issue resolution speed by 16.6%, saving an average of 9.1 days per issue. We further leverage counterfactual estimations to analyze the downstream effects of workflow automation. We observe that the speed gain does not compromise quality, as workflow automation significantly increases the contribution volume (closed issues) and project quality (stars, forks, and releases). This study unpacks the distinct mechanisms of workflow automation, showing that mechanization accelerates routine maintenance-oriented incremental innovation, whereas orchestration catalyzes creative development-oriented substantive innovation. Our study contributes to research and practice on automation, innovation, and software development by demonstrating that workflow automation not only accelerates innovation but also reshapes the underlying processes through which innovation unfolds in OSS development.\n"},{id:"",title:"Asymmetric Learning Effects of Chief Information Officer (CIO) Outside Board Appointments: Cybersecurity Implications for Sender and Receiver Firms",url:"https://pubsonline.informs.org/doi/abs/10.1287/isre.2024.1003",doi:"10.1287/isre.2024.1003",authors:["Short J","D'Arcy J","**Hong Y**"],journal:"ISR",year:2026,volume:"",forthcoming:!0,topics:["Future of Work"],abstract:"As cybersecurity becomes a critical board-level concern, public companies increasingly appoint chief information officers (CIOs) from other firms to their boards to enhance organizational learning. Drawing on the board interlock literature, we examine two pathways through which such appointments influence a firm\u2019s cybersecurity learning: (a) the receiver pathway, where a firm appoints a CIO from another company and gains external cybersecurity expertise; and (b) the sender pathway, where a firm\u2019s own CIO serves on an outside board and potentially brings back valuable insights. We consider the conditions that enable or constrain learning in each pathway and how these affect a firm\u2019s data breach risk. Leveraging a panel data set of 17,227 CIO-firm-year-level observations (2005\u20132022), we find that sender firms\u2014those whose CIOs serve on external boards\u2014experience a significant increase in breach probability. In contrast, receiver firms\u2014those appointing outside CIOs\u2014see a significant decrease in breach probability. Further mechanism analyses show that these outcomes are shaped by heterogeneity in the cybersecurity practices of both sender and receiver firms. Sender firms face increased breach risk when the receiver firm lacks strong cybersecurity emphasis or has a breach history. This risk is mitigated if the sender firm has a chief information security officer (CISO) on its top management team. Receiver firms benefit when the sender firm emphasizes cybersecurity, but also when it has had a past breach. This latter finding diverges from typical contagion effects in the interlock literature, suggesting that negative cybersecurity events may serve as valuable learning opportunities. We attribute these asymmetric effects to the CIO\u2019s unique role in interlocks. Unlike other executives, CIOs often act as deeply engaged educators and hands-on problem solvers in cybersecurity on the boards they join. Their focus on knowledge dissemination over acquisition, alongside their ongoing operational responsibilities within their home firm, appears to negate potential sender-side learning benefits. Our findings inform firms on their decisions about recruiting outside CIOs to their boards, permitting internal CIOs to join external boards, and guide policymakers aiming to strengthen cybersecurity expertise on corporate boards.\n"},{id:"",title:"Lost in the Crowd: How Group Size and Content Moderation Shape User Engagement in Live Streaming",url:"https://doi.org/10.1287/isre.2022.0086",doi:"10.1287/isre.2022.0086",authors:["Zhao K","**Hong Y**","Ma T","Lu Y","Hu Y"],journal:"ISR",year:2025,volume:"36(4):2076-2095",forthcoming:!1,topics:["Digital Media","Digital Platforms"],abstract:"Despite the focus of the digital content literature on asynchronous platforms (e.g., Reddit, Wikipedia, Yelp), synchronous content platforms like live streaming (e.g., Twitch, Youtube Live) have become increasingly popular for enabling real-time user engagement at scale. These platforms involve engaging a sizable user base, facilitating their interactions within a contemporaneous environment. As group size increases, real-time interactivity scales rapidly, making the engagement interface fast-paced and erratic. Consequently, live-streaming channels often use moderators to address the challenge. While the existing literature finds that the audience\u2019s group size has a positive effect on user engagement on asynchronous platforms, how group size affects synchronous interactions, particularly with the presence of bot and human moderators, is unclear. In this work, we leverage exogenous increases in live streaming viewers (from the Raid function in Twitch) to empirically examine the impact of group size on commenters\u2019 engagement in real time. Furthermore, we delve into the role of moderators and their influence on this nuanced dynamic. Leveraging difference-in-differences as the econometric identification strategy, we analyze panel data constructed with chat histories of 7,074 playbacks on Twitch. The results suggest that a) existing commenters tend to engage less after the increases in group size; b) the negative engagement effect is the product of mediation effects by way of the increased topic incoherence and emotional polarity of comment (herein referred to as \u201ccomment polarity\u201d) that decreases engagement; c) live streaming channels adopting bot or human moderators can better curb the negative effect, such that bot moderators are effective in decreasing the escalation of incoherence, particularly when the incoming Raider group is large; while human moderators better limit surges in comment polarity, particularly when the incoming Raider group is small. The findings in this paper indicate a congestion effect, a negative externality of increasing group size on commenter engagement in synchronous content platforms, further revealing a nuanced relationship among group size, topic incoherence, comment polarity, and user engagement. Our research further suggests the beneficial role of content moderators, which provides implications for online platform operators and policymakers.\n"},{id:"",title:"Advancing Next-Generation Multimethod Research in Information Systems: A Framework and Some Recommendations for Authors and Evaluators",url:"https://doi.org/10.1287/isre.2025.editorial.v36.n2",doi:"10.1287/isre.2025.editorial.v36.n2",authors:["Sarker S","Bala H","**Hong Y**","Kankanhalli A","Rossi M","Gu B","Oestreicher-Singer G"],journal:"ISR",year:2025,volume:"36(2):647-668",forthcoming:!1,topics:["Editorial"],abstract:"The increasing complexity of sociotechnical phenomena, proliferation of diverse data sources, expanding repertoire of research methods, and broadening multiparadigmatic awareness and competence have spurred a growing interest in multimethod research in the information systems (IS) field. This editorial recognizes and celebrates the value of integrating diverse methods and offers a framework to classify multimethod research using two dimensions: (a) methodological distance\u2014the degree of difference (proximate or distant) between methods employed in terms of characteristics such as paradigmatic assumptions, techniques, and goals; and (b) nature of integration\u2014the extent to which the methods are combined in loosely coupled (interlayered) or tightly coupled (intertwined) ways. These dimensions yield four types of multimethod research: assembly (proximate methods with interlayered integration), blend (proximate methods with intertwined integration), bridge (distant methods with interlayered integration), and fusion (distant methods with intertwined integration). We illustrate each archetype with studies published in leading IS journals. Building on these examples, we provide actionable guidance for authors on conducting and presenting multimethod research and also offer recommendations for evaluators of multimethod work. More broadly, we call on the IS community to embrace multimethod research not as an ad hoc stack of methods, but as a systematic strategy, aligning with these recommendations related to methodological distance and nature of integration, to produce a credible, revelatory, and rich body of knowledge on multifaceted IS phenomena.\n"},{id:"",title:"Monitoring and the cold start problem in digital platforms: Theory and evidence from online labor markets",url:"https://doi.org/10.1287/isre.2021.0146",doi:"10.1287/isre.2021.0146",authors:["Liang C","**Hong Y**","Gu B"],journal:"ISR",year:2025,volume:"36(1):600-620",forthcoming:!1,topics:["Future of Work","Digital Platforms"],abstract:"Many online labor platforms employ reputation systems and monitoring systems to mitigate moral hazard. Whereas reputation systems have the potential to reduce moral hazard, they suffer from the cold-start problem, in which new entrants without an established reputation face a high entry barrier as employers predominantly select workers based on their existing reputation. Monitoring systems, providing employers with direct oversight of workers\u2019 actions, offer a different approach. By tracking and reporting workers\u2019 effort levels, monitoring systems reduce ex post information asymmetry and, thus, lower employers\u2019 expected moral hazard risk from workers. However, unlike reputation systems, monitoring systems do not directly address ex ante information asymmetry, failing to assist employers in identifying the right workers. This inherent limitation raises questions about their effectiveness in resolving the cold-start problem. In this paper, we first propose a stylized theoretical model that characterizes worker entry in the presence of reputation and monitoring systems. Based on a unique data set from a leading online labor platform, we then empirically investigate the effect of monitoring systems on the entry barriers by examining the change in workers\u2019 entry behaviors after the introduction of the monitoring system along with associated project outcomes, which include employers\u2019 hiring preferences, hiring prices, and project performance. We exploit the differential availability of the monitoring system across two project types: time-based projects, for which the monitoring system is accessible, and fixed-price projects, for which it is not. Employing a difference-in-differences estimation with a sample including 9,344 fixed-price projects and 3,118 time-based projects, we report that the introduction of the monitoring system increases the number of bids on time-based projects by 27.8%, and the incremental bids predominantly originate from inexperienced workers who lack platform reputation. We further find that, following the introduction of the monitoring system, employers\u2019 preference for experienced workers diminishes, accompanied by an average reduction of 19.5% in labor costs, whereas we observe no significant decrease in project completion and review rating. Our results collectively suggest that monitoring systems alleviate the cold-start problem in online platforms.\n"},{id:"",title:"Enhancing user privacy through ephemeral sharing design: Experimental evidence from online dating",url:"https://doi.org/10.1287/isre.2021.0379",doi:"10.1287/isre.2021.0379",authors:["He Y","Xu X","Huang N","**Hong Y**","Liu D"],journal:"ISR",year:2025,volume:"36(1):162\u2013183",forthcoming:!1,topics:["Digital Platforms"],abstract:"Users on online dating platforms tend to encounter a cold-start problem, with limited user engagement in the initial stages of the matching process; this is partially due to privacy concerns. In this study, we propose ephemeral sharing as a privacy-enhancing design to strike a balance between users\u2019 privacy concerns and the need for voluntary information disclosure. Ephemeral sharing refers to a digital design in which the information shared (e.g., a personal photo) becomes invisible and irretraceable to the receiver shortly after the receipt of such information. In partnership with an online dating platform, we report a large-scale randomized field experiment with more than 70,000 users to understand how ephemeral sharing influences users\u2019 disclosure of personal photos, match outcome, and receiver engagement. The experiment features a treatment group in which subjects can upload an ephemeral photo along with their matching request and a control group in which subjects can instead upload a persistent photo. We find that users in the treatment group send more personal photos (and ones with human faces) compared with users in the control group. Additionally, the ephemeral sharing treatment leads to a higher number of matches and a higher level of receiver engagement. Further analyses suggest that the treatment effects are more salient for privacy-sensitive senders. Moreover, we find that the treatment effects on match outcome and receiver engagement can be explained by increases in the disclosure of personal photos. Last, through an online experiment, we show that ephemeral sharing increases disclosure intention by reducing privacy concerns related to data collection, dissemination, and identity abuse. Our study contributes to the literature and practice on privacy-enhancing designs for online matching platforms.\n"},{id:"",title:"Monitoring and home bias in global hiring: Evidence from an online labor platform",url:"https://doi.org/10.1287/isre.2021.0526",doi:"10.1287/isre.2021.0526",authors:["Liang C","**Hong Y**","Gu B"],journal:"ISR",year:2025,volume:"36(2):736-760",forthcoming:!1,topics:["Future of Work","Digital Platforms"],abstract:"The increasing prevalence of remote work has accelerated the adoption of monitoring systems to keep track of worker behavior, especially on online labor platforms. In contrast to the existing literature that predominantly focuses on the effect of monitoring on productivity, this study investigates the impact of monitoring from the perspective of contractual governance. In principle, by enabling the detailed real-time observation of worker progress, the deployment of monitoring systems has the potential to improve contractual control and coordination, thereby reducing employers\u2019 preferences for domestic workers (home bias). Leveraging the exogenous introduction of a monitoring system for time-based projects on a leading online labor platform, we employ a difference-in-differences model to estimate the impact of monitoring systems in reducing home bias. Our findings reveal that following the monitoring system\u2019s introduction, the bias against foreign workers becomes substantially weaker and statistically insignificant, highlighting the overlooked role of monitoring systems in fostering a more level playing field for global workers. Our further analysis indicates that monitoring leads to a notable 15% increase in the hiring of foreign workers. Moreover, the decrease in home bias is more pronounced in high-routine projects or when employers lack prior positive experiences with foreign workers, two scenarios characterized by low external uncertainty and high internal uncertainty, respectively. Additionally, employers no longer exhibit a stronger home bias when workers have higher ratings, where the expected moral hazard risk is lower, nor when workers reside in the same time zone, where expected coordination costs are lower. These findings lend support to the effectiveness of monitoring systems in mitigating employers\u2019 home bias through enhancing contractual control and coordination. Our findings provide important managerial implications for the design of online labor platforms.\n"},{id:"",title:"Platform governance with algorithm-based content moderation: An empirical study on Reddit",url:"https://doi.org/10.1287/isre.2021.0036",doi:"10.1287/isre.2021.0036",authors:["He Q","**Hong Y**","Raghu T"],journal:"ISR",year:2025,volume:"36(2):1078-1095",forthcoming:!1,topics:["Human-AI Interaction","Digital Media"],abstract:"With increasing volumes of participation in social media and online communities, content moderation has become an integral component of platform governance. Volunteer (human) moderators have thus far been the essential workforce for content moderation. Because volunteer-based content moderation faces challenges in achieving scalable, desirable, and sustainable moderation, many online platforms have recently started to adopt algorithm-based content moderation tools (bots). When bots are introduced into platform governance, it is unclear how volunteer moderators react in terms of their community-policing and -nurturing efforts. To understand the impacts of these increasingly popular bot moderators, we conduct an empirical study with data collected from 156 communities (subreddits) on Reddit. Based on a series of econometric analyses, we find that bots augment volunteer moderators by stimulating them to moderate a larger quantity of posts, and such effects are pronounced in larger communities. Specifically, volunteer moderators perform 20.9% more community policing, particularly over subjective rules. Moreover, in communities with larger sizes, volunteers also exert increased efforts in offering more explanations and suggestions after their community adopted bots. Notably, increases in activities are primarily driven by the increased need for nurturing efforts to accompany growth in subjective policing. Moreover, introducing bots to content moderation also improves the retention of volunteer moderators. Overall, we show that introducing algorithm-based content moderation into platform governance is beneficial for sustaining digital communities.\n"},{id:"",title:"When the clock strikes: A multimethod investigation of on-the-hour effects in online learning",url:"https://doi.org/10.1287/isre.2023.1234",doi:"10.1287/isre.2023.1234",authors:["Huang N","Wang L","**Hong Y**","Lin L","Guo X","Chen G"],journal:"ISR",year:2024,volume:"35(2):766\u2013782",forthcoming:!1,topics:["Human-AI Interaction"],abstract:"Online learners often experience a lack of sustained motivation given the self-paced nature of online learning, resulting in inefficiency and a high dropout rate. Therefore, it is important to explore options that help users optimize their learning behavior and improve their learning performance. This study proposes that on-the-hour time points as external temporal cues can significantly influence online learning outcomes. Using a multimethod approach (i.e., archival data analysis, laboratory experiments, and framed field experiments), we show that (a) starting learning sessions at on-the-hour time points activates users\u2019 implemental mindset, which supports them in building greater learning persistence and achieving better learning performance, and (b) social presence significantly attenuates the effects of on-the-hour time points in online learning. Our findings add to the literature on the design of online learning systems by clarifying the effects of temporal cues in user-system interactions, which provides implications for notification and reminder strategies that can be implemented to further enhance the effectiveness of online learning.\n"},{id:"",title:"Voice-based AI in call center customer service: A natural field experiment",url:"https://doi.org/10.1111/poms.13953",doi:"10.1111/poms.13953",authors:["Wang L","Huang N","**Hong Y**","Liu L","Guo X","Chen G"],journal:"POM",year:2023,volume:"32(4):1002\u20131018",forthcoming:!1,topics:["Human-AI Interaction"],abstract:"Voice\u2010based artificial intelligence (AI) systems have been recently deployed to replace traditional interactive voice response (IVR) systems in call center customer service. However, there is little evidence that sheds light on how the implementation of AI systems impacts customer behavior, as well as AI systems\u2019 effects on call center customer service performance. By leveraging the proprietary data obtained from a natural field experiment in a large telecommunication company, we examine how the introduction of a voice\u2010based AI system affects call length, customers\u2019 demand for human service, and customer complaints in call center customer service. We find that the implementation of the AI system temporarily increases the duration of machine service and customers\u2019 demand for human service; however, it persistently reduces customer complaints. Furthermore, our results reveal interesting heterogeneity in the effectiveness of the voice\u2010based AI system. For relatively simple service requests, the AI system reduces customer complaints for both experienced and inexperienced customers. However, for complex requests, customers appear to learn from the prior experience of interacting with the AI system, which leads to fewer complaints. Moreover, the AI\u2010based system has a significantly larger effect on reducing customer complaints for older and female customers as well as for customers who have had extensive experience using the IVR system. Finally, we find that speech\u2010recognition failures in customer\u2010AI interactions lead to increases in customers\u2019 demand for human service and customer complaints. The results from this study provide implications for the implementation of an AI system in call center operations.\n"},{id:"",title:"The hidden costs and benefits of monitoring in the gig economy",url:"https://doi.org/10.1287/isre.2022.1130",doi:"10.1287/isre.2022.1130",authors:["Liang C","Peng J","**Hong Y**","Gu B"],journal:"ISR",year:2023,volume:"34(1):297\u2013318",forthcoming:!1,topics:["Future of Work"],abstract:"Monitoring, a digital surveillance technology that allows employers to track the activities of workers, is ubiquitous in the gig economy wherein the workforce is geographically dispersed. However, workers are often reluctant to be monitored because of privacy concerns, resulting in a hidden economic cost for employers as workers tend to demand higher wages for monitored jobs. To help employers make informed decisions on whether they should adopt monitoring and how to design monitoring policies, we investigate how three common dimensions of monitoring affect workers\u2019 willingness to accept monitored jobs as well as the underlying mechanisms through online experiments on two gig economy platforms (Amazon Mechanical Turk (AMT) and Prolific). The three dimensions of monitoring are intensity (how much information is collected), transparency (whether the monitoring policy is disclosed to workers), and control (whether workers can remove sensitive information). We find that, as the monitoring intensity increases, workers become less willing to accept monitoring because of elevated privacy concerns. Furthermore, we find that being transparent about the monitoring policy increases workers\u2019 willingness to accept monitoring only when the monitoring intensity is low. Transparent disclosure does not reduce privacy concerns over high-intensity monitoring. Interestingly, providing control over high-intensity monitoring does not significantly reduce workers\u2019 privacy concerns either, rendering this well-intentioned policy ineffective. Finally, females are more willing to accept monitored jobs than males as they perceive higher payment protection from monitoring and have lower privacy concerns. On average, we estimate that the compensations required for workers to accept monitoring are $1.8/hour for AMT workers and $1.6/hour for Prolific workers, which translate to roughly 37.5% and 28.6% of their average hourly wages, respectively.\n"},{id:"",title:"Putting religious bias in context: How offline and online contexts shape religious bias in online prosocial lending",url:"https://doi.org/10.25300/MISQ/2022/16959",doi:"10.25300/MISQ/2022/16959",authors:["Sabzehzar A","Burtch G","**Hong Y**","Raghu T"],journal:"MISQ",year:2023,volume:"47(1):33\u201362",forthcoming:!1,topics:["Digital Platforms"],abstract:"Biases on online platforms pose a threat to social inclusion. We examine the influence of a novel source of bias in online philanthropic lending, namely that associated with religious differences. We first propose religion distance as a probabilistic measure of differences between pairs of individuals residing in different countries. We then incorporate this measure into a gravity model of trade to explain variation in country-to-country lending volumes. We further propose a set of contextual moderators that characterize individuals\u2019 offline (local) and online social contexts, which we argue combine to determine the influence of religion distance on lending activity. We empirically estimate our gravity model using data from Kiva.org, reflecting all lending actions that took place between 2006 and 2017. We demonstrate the negative and significant effect of religion distance on lending activity, over and above other established factors in the literature. Further, we demonstrate the moderating role of lenders\u2019 offline social context (diversity, social hostilities, and governmental favoritism of religion) on the aforementioned relationship to online lending behavior. Finally, we offer empirical evidence of the parallel role of online contextual factors, namely those related to community features offered by the Kiva platform (lending teams), which appear to amplify the role of religious bias. In particular, we show that religious team membership is a double-edged sword that has both favorable and unfavorable consequences, increasing lending in general but skewing said lending toward religiously similar borrowers. Our findings speak to the important frictions associated with religious differences in individual philanthropy; they point to the role of governmental policy vis-\xe0-vis religious tolerance as a determinant of citizens\u2019 global philanthropic behavior, and they highlight design implications for online platforms with an eye toward managing religious bias.\n"},{id:"",
title:"Direct and indirect spillovers from content providers\u2019 switching: Evidence from online livestreaming",url:"https://doi.org/10.1287/isre.2022.1160",doi:"10.1287/isre.2022.1160",authors:["Zhao K","Lu Y","Hu Y","**Hong Y**"],journal:"ISR",year:2023,volume:"34(3):847\u2013866",forthcoming:!1,topics:["Digital Media"],abstract:"Content providers in online social media platforms, particularly livestreaming, often switch content categories. Despite its uniqueness and importance, there is a dearth of academic research examining the unintended effects of providers\u2019 content switching. We study the direct and indirect spillover effects of content switching for livestreamers\u2014individuals who broadcast content through livestreaming platforms. We propose a framework based on theories related to viewer flow and network effects to conceptualize the direct and indirect spillover effects of entrant streamers\u2019 content switching on the incumbent streamers. Contrary to conventional wisdom, which concerns the negative effects on the incumbent\u2019s viewership, we propose two positive spillover effects that are unique to the social media platform setting: (a) the entrant streamers do not just increase competition among streamers, but they also bring their own viewers to the new category, which benefits the incumbent streamers because of a streaming flow effect (direct spillover), and (b) the entrant streamers influence incumbent streamers\u2019 viewer size by boosting category visibility through indirect network effects (indirect spillover). We also propose that the two spillover effects are contingent on the size of the entrant streamers\u2019 follower base. Based on a unique observational data set from the leading livestreaming platform (Twitch.tv), particularly with viewer flow data at the streamer\u2013session level, we first estimate that average content switching is associated with a 1.3% net increase in direct net viewer flow from the entrant to an incumbent. And this direct spillover effect is attenuated by the size of the entrant streamers\u2019 follower base. We also estimate that average content switching is associated with a 2.6% net increase in (indirect) net viewer flow from outside categories to an incumbent streamer. And this indirect spillover effect is reinforced by the entrant streamers\u2019 follower base size. This study contributes to the emerging literature on the dynamics of content creation on social media platforms in the emerging context of livestreaming. We discuss the managerial implications of this study for streaming strategies and platform management.\n"},{id:"",title:"Some thoughts on reviewing for Information Systems Research and other leading information systems journals",url:"https://doi.org/10.1287/isre.2023.editorial.v34.n4",doi:"10.1287/isre.2023.editorial.v34.n4",authors:["Sarker S","Whitley EA","Goh K","**Hong Y**","MAhring M","Sanyal P","Su N","Xu H","Xu JD","Zhang J"],journal:"ISR",year:2023,volume:"34(4):1321\u20131338",forthcoming:!1,topics:["Editorial"],abstract:""},{id:"",title:"Differential effects of multidimensional review evaluations on product sales for mainstream vs. niche products",url:"https://doi.org/10.25300/MISQ/2022/15469",doi:"10.25300/MISQ/2022/15469",authors:["Zheng X","Cao J","**Hong Y**","Yang S","Ren X"],journal:"MISQ",year:2023,volume:"47(2):833\u2013856",forthcoming:!1,topics:["Digital Media"],abstract:"Despite a large body of literature on online reviews, none have considered the nuanced impacts of how multidimensional reviews affect product sales differently for mainstream vs. niche products. This study seeks to fill this knowledge gap by conducting complementary studies in two product categories (i.e., automobiles and laptops) with different methods (a field study and three lab experiments). Our paper reveals three key insights into the emerging literature and phenomenon on multidimensional review systems: (1) the interdimensional rating variance is more negatively related to product sales for mainstream products than for niche products in the same category, (2) the intradimensional rating valence on the dominant dimension of a product is more positively related to product sales for niche products than for mainstream products, and (3) the intradimensional rating variance on the dominant dimension of a product is more negatively related to product sales for niche products than for mainstream products. Our research provides important managerial implications for both product providers and review platforms.\n"},{id:"",title:"SHEDR: an end-to-end deep neural event detection and recommendation framework for hyperlocal news using social media",url:"https://doi.org/10.1287/ijoc.2021.1112",doi:"10.1287/ijoc.2021.1112",authors:["Hu Y","**Hong Y**"],journal:"IJOC",year:2022,volume:"34(2):790\u2013806",forthcoming:!1,topics:["Human-AI Interaction","Digital Media"],abstract:"Residents often rely on newspapers and television to gather hyperlocal news for community awareness and engagement. More recently, social media have emerged as an increasingly important source of hyperlocal news. Thus far, the literature on using social media to create desirable societal benefits, such as civic awareness and engagement, is still in its infancy. One key challenge in this research stream is to timely and accurately distill information from noisy social media data streams to community members. In this work, we develop SHEDR (social media\u2013based hyperlocal event detection and recommendation), an end-to-end neural event detection and recommendation framework with a particular use case for Twitter to facilitate residents\u2019 information seeking of hyperlocal events. The key model innovation in SHEDR lies in the design of the hyperlocal event detector and the event recommender. First, we harness the power of two popular deep neural network models, the convolutional neural network (CNN) and long short-term memory (LSTM), in a novel joint CNN-LSTM model to characterize spatiotemporal dependencies for capturing unusualness in a region of interest, which is classified as a hyperlocal event. Next, we develop a neural pairwise ranking algorithm for recommending detected hyperlocal events to residents based on their interests. To alleviate the sparsity issue and improve personalization, our algorithm incorporates several types of contextual information covering topic, social, and geographical proximities. We perform comprehensive evaluations based on two large-scale data sets comprising geotagged tweets covering Seattle and Chicago. We demonstrate the effectiveness of our framework in comparison with several state-of-the-art approaches. We show that our hyperlocal event detection and recommendation models consistently and significantly outperform other approaches in terms of precision, recall, and F-1 scores.\n"},{id:"ridesharing-traffic-congestion",title:"How do on-demand ridesharing services affect traffic congestion? The moderating role of urban compactness",url:"https://doi.org/10.1111/poms.13530",doi:"10.1111/poms.13530",authors:["Li Z","Liang C","**Hong Y**","Zhang Z"],journal:"POM",year:2022,volume:"31(1):239\u2013258",forthcoming:!1,topics:["Digital Platforms"],abstract:"The role of information technology (IT) in managing operations that support environmentally sustainable growth has been emphasized a lot in operations management and information systems research. In this paper, we study the impact of the IT\u2010based on\u2010demand ridesharing platforms on an important aspect of sustainability\u2014traffic congestion. Our theoretical prediction suggests two countervailing effects from the entry of ridesharing platforms to urban areas: the efficiency\u2010enhancing effect that reduces traffic congestion and the demand\u2010inducing effect that increases traffic congestion. We propose that the impacts of ridesharing services on traffic congestion should vary with urban spatial features. Given the theoretical tension, we investigate the impact of Uber entry on traffic congestion in urban areas of the United States with a focus on the moderating role of urban compactness. Based on a unique dataset that combines multiple archival sources, we empirically examine whether the entry of Uber's on\u2010demand ridesharing service affects traffic congestion by using a difference\u2010in\u2010differences framework. Our empirical evidence indicates that ridesharing services significantly increase traffic congestion in compact areas. Meanwhile, we find some marginal evidence that ridesharing services decrease traffic congestion in sprawling urban areas. The results are robust to a series of additional analyses, including the use of alternative measures, relative time model, entry exogeneity test, and placebo tests. We conclude that the efficiency\u2010enhancing and demand\u2010inducing effects shape traffic congestion and that the net effect varies according to different levels of urban compactness. We provide circumstantial evidence for the underlying mechanisms by analyzing public transit and commuting characteristic data.\n"},{id:"peer-awards-reddit",title:"How do peer awards motivate creative content? Experimental evidence from Reddit",url:"https://doi.org/10.1287/mnsc.2021.4040",doi:"10.1287/mnsc.2021.4040",authors:["Burtch G","He Q","**Hong Y**","Lee D"],journal:"MS",year:2022,volume:"68(5):3488\u20133506",forthcoming:!1,topics:["Digital Media"],abstract:"We theorize peer awards\u2019 effects on the volume and novelty of creative user-generated content (UGC) produced at online platform communities. We then test our hypotheses via a randomized field experiment on Reddit, wherein we randomly and anonymously assigned Reddit\u2019s Gold Award to 905 users\u2019 posts over a two-month period. We find that peer awards induced recipients to make longer, more frequent posts and that these effects were particularly pronounced among newer community members. Further, we show that recipients were causally influenced to engage in greater (lesser) exploitation (exploration) behavior, producing content that exhibited significantly greater textual similarity to their own past (awarded) content. However, because the effects were most pronounced among new community members, who also produce content that, in general, is systematically more novel than that of established members to begin with, this process yields a desirable outcome: larger volumes of generally novel UGC for the community.\n"},{id:"",title:"The screening role of design parameters for service procurement auctions in online service outsourcing platforms",url:"https://doi.org/10.1287/isre.2022.1168",doi:"10.1287/isre.2022.1168",authors:["Liang C","**Hong Y**","Chen P","Shao BB"],journal:"ISR",year:2022,volume:"33(4):1324\u20131343",forthcoming:!1,topics:["Digital Platforms","Future of Work"],abstract:"This paper provides a novel theoretical angle and robust empirical evidence demonstrating that the auction duration and item description length are two essential auction design parameters that can function as a screening mechanism for bidder quality on online service outsourcing platforms. These outsourcing platforms use buyer-determined reverse auctions to find providers of services (primarily IT services). Using data from a major online outsourcing platform that connects buyers with bidders, we examine the effects of the auction duration and the item description length on both bidder entry (i.e., the number of bids and bidder quality) and contract outcomes (i.e., whether a project is contracted and the buyer\u2019s expected utility from the winning bid) based upon not only project-level, but also bidder-level analyses. Our results show that auctions with longer durations and item descriptions attract more bids (i.e., higher quantity of bidders), and they also attract disproportionately more bidders with lower completion rates (i.e., lower quality of bidders), creating a double whammy of higher evaluation costs and adverse selection for buyers. This, in turn, leads to contracting inefficiency in terms of less successful contracting as well as lower buyer utility. Our research shows strong support for the screening role of the auction duration and the item description length for buyers on online outsourcing platforms for service procurement: by shortening auction durations and item descriptions, buyers can expect higher quality bidders, increase contracting probability, and enhance utility.\n"},{id:"",title:"Managing congestion in a matching market via demand information disclosure",url:"https://doi.org/10.1287/isre.2022.1148",doi:"10.1287/isre.2022.1148",authors:["Huang N","Burtch G","He Y","**Hong Y**"],journal:"ISR",year:2022,volume:"33(4):1196\u20131220",forthcoming:!1,topics:["Digital Platforms"],abstract:"Congestion is a common issue in digital platform markets, wherein users tend to focus their attention on a subset of popular peers. We examine this issue in the context of online dating, considering the potential efficacy of an informational intervention, namely, the disclosure of peers\u2019 recent demand. In doing so, we first note that the benefits of disclosing demand information are not altogether clear in this context, a priori, because dating platforms are distinct from other platforms in several important respects. On the one hand, dating platforms facilitate social relationships, rather than trade in goods and services. Therefore, they operate on different norms and typically lack common levers that platform operators employ to balance supply and demand, such as pricing mechanisms and reputation systems. Dating app users may therefore pay greater attention to the quality implications of peer demand information, worsening congestion. On the other hand, demand information disclosure may be atypically effective at mitigating congestion in a dating context because, in addition to opportunity costs of time and effort, daters also bear fears of social rejection, leading them to shy away from in-demand peers. We evaluate our treatment\u2019s efficacy in mitigating congestion and improving matching efficiency, conducting a randomized field experiment at a large mobile dating platform. Our results show that the intervention is particularly effective at improving matching efficiency when presented in tandem with a textual message-framing cue that highlights the capacity implications of the peer demand information. Heterogeneity analyses further indicate that these effects are driven primarily by those users who most contend with congestion in the form of competition, namely, male users and those who rely more heavily upon outbound messages for matches.\n"},{id:"",title:"On factors that moderate the effect of buyer-supplier experience on e-procurement platforms",url:"https://doi.org/10.1111/poms.13291",doi:"10.1111/poms.13291",authors:["**Hong Y**","Shao BB"],journal:"POM",year:2021,volume:"30(4):1034\u20131051",forthcoming:!1,topics:["Digital Platforms"],abstract:"E\u2010procurement platforms facilitate transactions between suppliers and buyers from all over the world. Over time, suppliers and buyers may develop familiarity from prior experience with earlier transactions. The literature has established that prior experience leads to better project performance. In this study, we examine the effectiveness of prior experience between buyers and suppliers in e\u2010procurement platforms with a focus on the moderating roles of temporal distance and language difference between the buyer and the supplier as well as routine tasks in the project (termed \u201ctask routinization\u201d). Using a unique observational data set from a large e\u2010procurement platform, we first find that buyers\u2019 prior experience with a supplier positively affects project outcomes, and temporal distance and language difference both negatively affect project outcomes. More interestingly, we find that the effectiveness of prior experience is constrained by both temporal distance and language difference, such that if a greater temporal distance separates the buyer and supplier or if the two speak different languages, prior experience is less likely to be helpful. In addition, while task routinization does not directly affect a project\u2019s success, it has a positive interaction effect with prior experience, suggesting that buyers\u2019 prior experience with a supplier is more effective in enhancing project outcomes when a project comprises routine tasks. Our findings on prior experience, temporal distance, language difference, and task routinization contribute to a better understanding of the e\u2010procurement platform for global outsourcing and procurement. Limitations are discussed and topics are identified for future research.\n"},{id:"",title:"Measuring product type and purchase uncertainty with online product ratings: A theoretical model and empirical application",url:"https://doi.org/10.1287/isre.2021.1041",doi:"10.1287/isre.2021.1041",authors:["Chen P","Hitt LM","**Hong Y**","Wu S"],journal:"ISR",year:2021,volume:"32(4):1470\u20131489",forthcoming:!1,topics:["Digital Platforms","Digital Media"],abstract:"Building on the distinction between search and experience goods, as well as vertical and horizontal differentiation, we propose a set of theory-grounded, data-driven measures that allow us to measure not only product type (search vs. experience, horizontal vs. vertical differentiation) but also sources of uncertainty and to what extent consumer reviews help resolve uncertainty. The proposed measures have two advantages over prior methods: (1) unlike prior categorization schemes that classified goods as either search or experience goods, our measure is continuous, allowing us to rank-order the degree of search versus experience and horizontal versus vertical differentiation among products or categories. (2) Our approach is easier to implement than prior methods, because it relies solely on consumer ratings information (as opposed to expert judgment) and can be employed at multiple levels (attributes, products, or product categories). We illustrate empirical applications of our proposed measures using product rating data from Amazon.com. Our data-driven measures reveal the relative importance of fit in driving product utility and the importance of search for determining fit for each product category at Amazon. Our results also show that, while ratings based on verified purchasers are informative of objective product values, the current Amazon review system appears to have limited ability to resolve fit uncertainty. Our method and findings could facilitate further research on product review systems and enable quantitative measurement of product positioning to support marketing strategy for retailers and manufacturers, covering an expanded group of products.\n"},{id:"",title:"When does dispute resolution substitute for a reputation system? Empirical evidence from a service procurement platform",url:"https://doi.org/10.1111/poms.13341",doi:"10.1111/poms.13341",authors:["Burtch G","**Hong Y**","Kumar S"],journal:"POM",year:2021,volume:"30(6):1565\u20131582",forthcoming:!1,topics:["Future of Work"],abstract:"We consider the role of online dispute resolution (ex\u2010post guarantees of supplier quality) when introduced in the presence of an online reputation system (an ex\u2010ante informational mechanism), in the context of online service procurement platforms. We argue that dispute resolution will reduce buyers\u2019 reliance on reputation systems in their hiring decisions to varying extents, depending on the nature of the work required. We assess these predictions using proprietary data capturing projects, service providers, bids, and hiring decisions around a natural experiment: the introduction of a new dispute resolution system at a major online service procurement platform. We provide evidence consistent with our expectations; introducing a dispute resolution system led buyers to reduce their consideration of service provider rating volumes in hiring decisions, particularly for projects where service provider performance could be evaluated objectively by a third party (e.g., data entry, as opposed to more subjective, creative work, like logo design). We also report a variety of additional analyses, which demonstrate the robustness of our findings to alternative measures, dynamics of the effects depending on buyers\u2019 experience with the dispute process, and the impact of the dispute service on buyers\u2019 propensity to enter ratings of service providers. These findings provide empirical evidence that dispute resolution can be an effective, alternative means of mitigating supplier quality risks in online service procurement markets in place of ex\u2010ante signals of provider quality. However, this is particularly true in settings where the output of work contracted can be objectively evaluated by a third party.\n"},{id:"",title:"Just DM me (politely): Direct messaging, politeness, and hiring outcomes in online labor markets",url:"https://doi.org/10.1287/isre.2021.1003",doi:"10.1287/isre.2021.1003",authors:["**Hong Y**","Peng J","Burtch G","Huang N"],journal:"ISR",year:2021,volume:"32(3):786\u2013800",forthcoming:!1,topics:["Future of Work"],abstract:"This study examines the role of text-based direct messaging systems in online labor markets, which provide a communication channel between workers and employers, adding a personal touch to the exchange of online labor. We propose the effect of workers\u2019 use of the direct messaging system on employers\u2019 hiring decisions and conceptualize the information role of direct messaging. To empirically evaluate the information role of the direct messaging system, we leverage data on the direct messaging activities between workers and employers across more than 470,000 job applications on a leading online labor market. We report evidence that direct messaging with a prospective employer increases a worker\u2019s probability of being hired by 8.9%. However, the degree to which workers benefit from direct messaging is heterogeneous, and the effect amplifies for workers approaching employers from a position of disadvantage (lacking tenure or fit with the job) and attenuates as more workers attempt to message the same prospective employer. The effects also depend on message content. In particular, we find that the benefits of direct messaging for workers depend a great deal on the politeness of the workers, and this \u201cpoliteness effect\u201d depends on several contextual factors. The beneficial effects are amplified for lower-status workers (i.e., workers lacking tenure and job fit) and workers who share a common language with the employer. At the same time, the beneficial effects weaken in the presence of typographical errors. These findings provide important insights into when and what to message to achieve favorable hiring outcomes in online employment settings.\n"},{id:"",title:"Unemployment and worker participation in the gig economy: Evidence from an online labor market",url:"https://doi.org/10.1287/isre.2019.0896",doi:"10.1287/isre.2019.0896",authors:["Huang N","Burtch G","**Hong Y**","Pavlou PA"],journal:"ISR",year:2020,volume:"31(2):431\u2013448",forthcoming:!1,topics:["Future of Work"],abstract:"The gig economy has low barriers to entry, enabling flexible work arrangements and allowing workers to engage in contingent employment, whenever, and in some cases, such as online labor markets, wherever, workers desire. The growth of the gig economy has been partly attributed to technological advancements that enable flexible work environments. In this study, we consider the role of an alternative driver, economic downturns, and associated financial stressors in the offline economy, for example, unemployment. As the exact nature of the relationship between online labor supply and offline unemployment is not immediately clear, in this work, we seek to quantify the relationship, exploring heterogeneity across a variety of county-specific characteristics. We study these relationships in the context of a leading online labor market, combining data on the participation of workers residing in counties across the United States with county-level data on unemployment from the Bureau of Labor Statistics. Our results demonstrate a positive and significant association between local (county) unemployment in the traditional offline labor market and the supply of online workers residing in the same county, as well as significantly larger volumes of online project bidding activity from workers in the same county. Specifically, we estimate that a 1% increase in county unemployment is associated with a 21.8% increase in the volume of county residents actively working online at the platform. Furthermore, our results suggest significant heterogeneity in the relationship, such that a significantly larger supply of online labor manifests when unemployment occurs in counties characterized by better internet access, younger and more educated populations, and populations whose social ties are dispersed over a wider geographic area. We discuss the theoretical and practical implications for workers, online labor markets, and policy makers.\n"},{id:"",title:"Motivating user-generated content with performance feedback: Evidence from randomized field experiments",url:"https://doi.org/10.1287/mnsc.2017.2944",doi:"10.1287/mnsc.2017.2944",authors:["Huang N","Burtch G","Gu B","**Hong Y**","Liang C","Wang K","Fu D","Yang B"],journal:"MS",year:2019,volume:"65(1):327\u2013345",forthcoming:!1,topics:["Digital Platforms","Digital Media"],abstract:"We design a series of online performance feedback interventions that aim to motivate the production of user-generated content (UGC). Drawing on social value orientation (SVO) theory, we develop a novel set of alternative feedback message framings, aligned with cooperation (e.g., your content benefited others), individualism (e.g., your content was of high quality), and competition (e.g., your content was better than others). We hypothesize how gender (a proxy for SVO) moderates response to each framing, and we report on two randomized experiments, one in partnership with a mobile-app\u2013based recipe crowdsourcing platform, and a follow-up experiment on Amazon Mechanical Turk involving an ideation task. We find evidence that cooperatively framed feedback is most effective for motivating female subjects, whereas competitively framed feedback is most effective at motivating male subjects. Our work contributes to the literatures on performance feedback and UGC production by introducing cooperative performance feedback as a theoretically motivated, novel intervention that speaks directly to users\u2019 altruistic intent in a variety of task settings. Our work also contributes to the message-framing literature in considering competition as a novel addition to the altruism\u2013egoism dichotomy oft explored in public good settings.\n"},{id:"",title:"Stimulating online reviews by combining financial incentives and social norms",url:"https://doi.org/10.1287/mnsc.2016.2715",doi:"10.1287/mnsc.2016.2715",authors:["Burtch G","**Hong Y**","Bapna R","Griskevicius V"],journal:"MS",year:2018,volume:"64(5):2065\u20132082",forthcoming:!1,topics:["Digital Media"],abstract:"In hopes of motivating consumers to provide larger volumes of useful reviews, many retailers offer financial incentives. Here, we explore an alternative approach, social norms. We inform individuals about the volume of reviews authored by peers. We test the effectiveness of using financial incentives, social norms, and a combination of both strategies in motivating consumers. In two randomized experiments, one in the field conducted in partnership with a large online clothing retailer based in China and a second on Amazon Mechanical Turk, we compare the effectiveness of each strategy in stimulating online reviews in larger numbers and of greater length. We find that financial incentives are more effective at inducing larger volumes of reviews, but the reviews that result are not particularly lengthy, whereas social norms have a greater effect on the length of reviews. Importantly, we show that the combination of financial incentives and social norms yields the greatest overall benefit by motivating reviews in greater numbers and of greater length. We further assess treatment-induced self-selection and sentiment bias by triangulating the experimental results with findings from an observational study.\n"},{id:"",title:"Embeddedness, prosociality, and social influence: Evidence from online crowdfunding",url:"https://doi.org/10.25300/MISQ/2018/14105",doi:"10.25300/MISQ/2018/14105",authors:["**Hong Y**","Hu Y","Burtch G"],journal:"MISQ",year:2018,volume:"42(4):1211\u20131224",forthcoming:!1,topics:["Digital Platforms"],abstract:"This paper examines how (1) a crowdfunding campaign's prosociality (the production of a public versus private good), (2) the social network structure (embeddedness) among individuals advocating for the campaign on social media, and (3) the volume of social media activity around a campaign jointly determine fundraising from the crowd. Integrating the emerging literature on social media and crowdfunding with the literature on social networks and public goods, we theorize that prosocially, public-oriented crowdfunding campaigns will benefit disproportionately from social media activity when advocates' social media networks exhibit greater levels of embeddedness. Drawing on a panel dataset that combines campaign fundraising activity associated with more than 1,000 campaigns on Kickstarter with campaign-related social media activity on Twitter, we construct network-level measures of embeddedness between and amongst individuals initiating the latter, in terms of transitivity and topological overlap. We demonstrate that Twitter activity drives a disproportionate increase in fundraising for prosocially oriented crowdfunding campaigns when posting users' networks exhibit greater embeddedness. We discuss the theoretical implications of our findings, highlighting how our work extends prior research on the role of embeddedness in peer influence by demonstrating the joint roles of message features and network structure in the peer influence process. Our work suggests that when a transmitter's message is prosocial or cause-oriented, embeddedness will play a stronger role in determining influence. We also discuss the broader theoretical implications for the literatures on social media, crowdfunding, crowdsourcing, and private contributions to public goods. Finally, we highlight the practical implications for marketers, campaign organizers, and crowdfunding platform operators.\n"},{id:"",title:"The value of multidimensional rating systems: Evidence from a natural experiment and randomized experiments",url:"https://doi.org/10.1287/mnsc.2017.2852",doi:"10.1287/mnsc.2017.2852",authors:["Chen P","**Hong Y**","Liu Y"],journal:"MS",year:2018,volume:"64(10):4629\u20134647",forthcoming:!1,topics:["Digital Platforms","Digital Media"],
abstract:"Online product ratings offer information on product quality. Scholars have recently proposed the potential of designing multidimensional rating systems to better convey information on multiple dimensions of products. This study investigates whether and how multidimensional rating systems affect consumer satisfaction (measured by product ratings), based on both observational data and two randomized experiments. Our identification strategy of the observational study hinges on a natural experiment on TripAdvisor when the website started to allow consumers to rate multiple dimensions of the restaurants, as opposed to only providing an overall rating, in January 2009. We further obtain rating data on the same set of restaurants from Yelp, which controls for the unobserved restaurant quality over time and allows us to identify the causal effect using a difference-in-differences approach. Results from the econometric analyses show that ratings in a single-dimensional rating system have a downward trend and a higher dispersion, whereas ratings in a multidimensional rating system are significantly higher and convergent. Findings from two randomized experiments suggest that the multidimensional rating system helps consumers find products that better fit their preferences and increases the confidence of their choices. We also show that the observed results cannot be explained by the priming effect due to rating system interface or a list of other alternative explanations. The combined evidence from the natural experiment and randomized experiments support the view that the multidimensional rating system enhances rating informativeness and provide implications for designing online rating systems that help consumers match their preferences with product attributes.\n"},{id:"",title:"Surviving in global online labor markets for IT services: A geo-economic analysis",url:"https://doi.org/10.1287/isre.2017.0751",doi:"10.1287/isre.2017.0751",authors:["Kanat I","**Hong Y**","Raghu T"],journal:"ISR",year:2018,volume:"29(4):893\u2013909",forthcoming:!1,topics:["Future of Work"],abstract:"Global online labor markets (OLMs) lower the barriers to entry and enable global competition for information technology (IT) services from providers around the world. Although the prior OLM literature predominantly found systematic advantages for IT service providers from developed countries because of their higher perceived quality, the reality is that most service providers in OLM are from developing countries. This phenomenon requires a robust analysis of how OLMs are evolving. In this study, we conduct a geo-economic analysis on IT service providers\u2019 survival utilizing a unique longitudinal panel data set from an OLM, which comprises 40,874 IT service providers from different countries over a period of more than four years (2006 to 2010). Based on results from Survival models and a series of robustness checks, we were able to decipher how geo-economic factors (specifically the country development level) and reputation interact to determine service providers\u2019 survival. Our findings provide a different perspective from the prior literature on OLM by showing a systematic advantage for IT service providers from developing countries in terms of survival, especially when providers from developing countries were able to signal their individual quality through reputation. We explain and discuss the mechanisms underlying these effects, and highlight implications for OLMs for IT services.\n"},{id:"",title:"On the role of fairness and social distance in designing effective social referral systems",url:"https://doi.org/10.25300/MISQ/2017/41.3.06",doi:"10.25300/MISQ/2017/41.3.06",authors:["**Hong Y**","Pavlou PA","Shi N","Wang K"],journal:"MISQ",year:2017,volume:"41(3):787\u2013A13",forthcoming:!1,topics:["Digital Platforms"],abstract:"Online referral systems help firms attract new customers and expand their customer base by leveraging the social relationships of existing customers. We integrate ultimatum game theory, which focuses on fairness, with motivation theories to investigate the effects of social distance and monetary incentives on the performance of three competing designs for online referral systems: rewarding only or primarily the proposer, rewarding only or primarily the responder, and dividing the reward equally or fairly between the proposer and responder. A set of controlled laboratory and randomized field experiments were conducted to test how the fairness of the split of the reward (equal/fair versus unequal/unfair split of the referral bonus) and social distance (small versus large) between the proposer and the responder jointly affect the performance of online referral systems (the proposer sending an offer and the responder accepting the offer). For a large social distance (acquaintances or weak tie relationships), equally splitting the referral bonus results in the best performance. However, for a small social distance (friends or strong tie relationships), an equal split of the referral reward does not improve referral performance, which suggests that under a small social distance, monetary incentives may not work effectively. Face validity and external validity (generalizability) are ensured using two distinct measures of social distance across several contexts. Through the analysis of the interaction effects of fairness and social distance, our research offers theoretical and practical implications for social commerce by showing that the effectiveness of fairness on the success of online social referrals largely depends on social distance.\n"},{id:"",title:"On buyer selection of service providers in online outsourcing platforms for IT services",url:"https://doi.org/10.1287/isre.2017.0709",doi:"10.1287/isre.2017.0709",authors:["**Hong Y**","Pavlou PA"],journal:"ISR",year:2017,volume:"28(3):547\u2013562",forthcoming:!1,topics:["Future of Work","Digital Platforms"],abstract:"The Internet has presumably created a level playing field that allows any service provider across the globe to compete for contracts on online outsourcing platforms for information technology (IT) services. In this paper, we empirically examine (a) how country (language, time zone, cultural) differences and the country\u2019s IT development affect buyers\u2019 selection of service providers in online outsourcing platforms; and (b) how the reputation of service providers moderates the proposed effects of country differences and the country\u2019s IT development. We integrated a unique data set formed by a sample of 11,541 software development projects from an online outsourcing platform matched with archival sources on the language, time zone, culture, and IT development of countries. Since price is typically endogenous in any supply demand system, we used the exogenous variation of the normalized exchange rate of the currency among countries, as a \u201ccost-shifter\u201d type instrumental variable (IV) for econometric identification. Our panel data analyses results (both with and without IV) show that buyers are negatively affected by country differences in terms of language, time zone, and culture, and prefer service providers from countries with higher IT development. Notably, the reputation of service providers attenuates the negative effects of language and cultural (but not time zone) differences, while it substitutes the positive effect of the country\u2019s IT development. We discuss the study\u2019s theoretical and managerial implications for understanding the global dynamics of online outsourcing platforms and better designing these platforms.\n"},{id:"",title:"Social network integration and user content generation: Evidence from natural experiments",url:"https://doi.org/10.25300/MISQ/2017/41.4.02",doi:"10.25300/MISQ/2017/41.4.02",authors:["Huang N","**Hong Y**","Burtch G"],journal:"MISQ",year:2017,volume:"41(4):1035\u20131058",forthcoming:!1,topics:["Digital Media"],abstract:"This study examines how social network integration (i.e., integration of online platforms with other social media services, for example, with Facebook or Twitter) can affect the characteristics of user-generated content (volume and linguistic features) in the context of online reviews. Building on the social presence theory, we propose a number of hypotheses on how social network integration affects review volume and linguistic features of review text. We consider two natural experiments at leading online review platforms (Yelp.com and TripAdvisor.com), wherein each implemented a social network integration with Facebook. Constructing a unique panel dataset of online reviews for a matched set of restaurants across the two review sites, we estimate a difference-in-differences (DID) model to assess the impact of social network integration. We find that integration with Facebook increased the production of user-generated content and positive emotion in review text, while simultaneously decreasing cognitive language, negative emotion, and expressions of disagreement (negations) in review text. Our findings demonstrate that social network integration works as a double-edged sword. On the one hand, integration provides benefits in terms of increased review quantity. On the other hand, these benefits appear to come at the cost of reduced review quality, given past research which has found that positive, emotional reviews are perceived by users to be less helpful. We discuss the implications of these results as they relate to the creation of sustainable online social platforms for user content generation.\n"},{id:"",title:"Comparing open and sealed bid auctions: Evidence from online labor markets",url:"https://doi.org/10.1287/isre.2015.0606",doi:"10.1287/isre.2015.0606",authors:["**Hong Y**","Wang C","Pavlou PA"],journal:"ISR",year:2016,volume:"27(1):49\u201369",forthcoming:!1,topics:["Future of Work","Digital Platforms"],abstract:"Online labor markets are Web-based platforms that enable buyers to identify and contract for information technology (IT) services with service providers using buyer-determined (BD) auctions. BD auctions in online labor markets either follow an open or a sealed bid format. We compare open and sealed bid auctions in online labor markets to identify which format is superior in terms of obtaining more bids and a higher buyer surplus. Our theoretical analysis suggests that the relative advantage of open versus sealed bid auctions hinges on the role of reducing service providers\u2019 valuation uncertainty (difficulty in assessing the cost to execute a project) and competition uncertainty (difficulty in assessing the intensity of the competition from other service providers), which largely depend on the relative importance of the common value (versus the private value) component of the auctioned IT services, calling for an empirical investigation to compare open and sealed bid auctions. Based on a unique data set of 71,437 open bid auctions and 7,499 sealed bid auctions posted by 21,799 buyers at a leading online labor market, we find that, on average, although sealed bid auctions attract 18.4% more bids, open bid auctions offer buyers $10.87 higher surplus. Furthermore, open bid auctions are 55.3% more likely to result in a buyer\u2019s selection of a certain service provider and 22.1% more likely to reach a contract (conditional on the buyer\u2019s making a selection) with a provider, and they generate higher buyer satisfaction. In contrast to conventional wisdom that \u201cthe more bids the better\u201d and industry practice of treating sealed bid auctions as a premium feature, our results suggest that the buyer surplus gained from the reduction in valuation uncertainty enabled by open bid auctions outweighs the buyer surplus gained from the higher competition uncertainty in sealed bid auctions, which renders open bid auctions a superior auction design in online labor markets.\n"},{id:"",title:"Product fit
